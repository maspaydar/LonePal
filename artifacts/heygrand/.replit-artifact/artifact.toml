kind = "web"
previewPath = "/"
title = "HeyGrand"
version = "1.0.0"
id = "artifacts/heygrand"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21321

[services.development]
run = "pnpm --filter @workspace/heygrand run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/heygrand", "run", "build" ]
publicDir = "artifacts/heygrand/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21321"
BASE_PATH = "/"
