kind = "slides"
previewPath = "/investor-deck/"
title = "HeyGrand Investor Deck"
version = "1.0.0"
id = "artifacts/heygrand-investor-deck"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/investor-deck/" ]
localPort = 22591

[services.development]
run = "pnpm --filter @workspace/heygrand-investor-deck run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/heygrand-investor-deck", "run", "build" ]
publicDir = "artifacts/heygrand-investor-deck/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22591"
BASE_PATH = "/investor-deck/"
