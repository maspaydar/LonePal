kind = "video"
previewPath = "/launch-video/"
title = "HeyGrand Launch Video"
version = "1.0.0"
id = "artifacts/heygrand-launch-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/launch-video/" ]
localPort = 24801

[services.development]
run = "pnpm --filter @workspace/heygrand-launch-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/heygrand-launch-video", "run", "build" ]
publicDir = "artifacts/heygrand-launch-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24801"
BASE_PATH = "/launch-video/"
